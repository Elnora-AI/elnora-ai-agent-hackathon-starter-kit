# CodeQL — GitHub's native static analysis for security vulnerabilities
# Docs: https://docs.github.com/code-security/code-scanning
#
# Edit the `languages` matrix to match your project's languages.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan, Monday 06:00 UTC
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # Valid: actions, cpp, csharp, go, java-kotlin, javascript-typescript, python, ruby, swift
        # This starter kit has no compiled code — scan workflow files. Add languages as you adopt them.
        language: [actions]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
