# Dependabot — automated dependency updates
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
#
# Remove any ecosystem blocks that don't apply to your project.

version: 2
updates:
  # GitHub Actions workflow files
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"

  # Uncomment the ecosystems you use. Leaving a block enabled without the
  # matching manifest (package.json, requirements.txt, Dockerfile, etc.) logs
  # errors in the Dependabot Insights tab.

